    - NEXT_PUBLIC_BACKEND_URL_BROWSER=http://localhost:3003
    - PORT=3003
    - MONGO_URI=mongodb+srv://edukarp10_db_user:Rhjh8w8tKvSKsWbU@cluster0.3mbpxjo.mongodb.net/
    - JWT_SECRET=3f8d1a7e-4c9b-4e2a-9b2e-8d6f7c2a1b9e$!@XyZ2025!@%aBcDe
    
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
